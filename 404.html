<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        (function() {
            try {
                var saved = localStorage.getItem('theme');
                var theme = saved === 'dark' || saved === 'light' ? saved : 'light';
                document.documentElement.setAttribute('data-theme', theme);
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
</head>
<body class="bg-global-bg text-global-text antialiased">

    <!-- Fixed Header -->
    <header id="main-header" class="group">
        <div class="header-grid">
            <!-- Logo -->
            <a href="index.html" class="group header-logo flex items-center">
                <img src="assets/logo.svg" class="me-3 h-12 w-12 sm:me-4 sm:h-20 sm:w-20" alt="Logo">
            </a>

            <!-- Title -->
            <div class="header-title">
                <span class="text-xl font-bold sm:text-2xl">Tomás Barrientos</span>
            </div>

            <!-- Desktop Navigation -->
            <nav class="mobile-nav-menu header-nav sm:flex sm:flex-row sm:items-center" id="navigation-menu">
                <a href="index.html#about">About</a>
                <a href="index.html#projects">Projects</a>
                <a href="index.html#resources">Resources</a>
                <a href="index.html#resume">Résumé</a>
            </nav>

            <!-- Controls -->
            <div class="header-controls flex items-center gap-3">
                <!-- Theme Toggle -->
                <button id="theme-toggle" class="flex h-7 w-7 items-center justify-center rounded-md border border-accent-2/20 bg-accent-2/10 p-1 transition-colors hover:bg-accent-2/20" aria-label="Switch to dark theme">
                    <svg class="sun-icon h-4 w-4" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"></path>
                    </svg>
                    <svg class="moon-icon h-4 w-4" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
                    </svg>
                </button>

                <!-- Mobile Menu Toggle -->
                <button id="toggle-navigation-menu" class="flex h-7 w-7 items-center justify-center rounded-md border border-accent-2/20 bg-accent-2/10 p-1 transition-colors hover:bg-accent-2/20 sm:hidden" aria-expanded="false" aria-label="Toggle navigation menu">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="mx-auto max-w-3xl px-4 sm:px-8" style="min-height:65vh; display:flex; align-items:center; justify-content:center;">
        <div style="text-align:center;">

            <!-- 404 + Penguin -->
            <div style="display:flex; align-items:center; justify-content:center; gap:1.5rem; flex-wrap:wrap; margin-bottom:1.5rem;">
                <span style="font-size:clamp(5rem,18vw,9rem); font-weight:700; line-height:1; color:var(--color-accent); font-family:'JetBrains Mono',monospace;">404</span>

                <!-- Penguin SVG -->
                <svg viewBox="0 0 100 155" width="110" height="170" xmlns="http://www.w3.org/2000/svg" aria-label="A lost penguin">
                    <!-- Body -->
                    <ellipse cx="50" cy="105" rx="31" ry="43" fill="#3D2B1F"/>
                    <!-- Belly -->
                    <ellipse cx="50" cy="112" rx="18" ry="30" fill="#F5F0E8"/>
                    <!-- Head -->
                    <ellipse cx="50" cy="54" rx="25" ry="26" fill="#3D2B1F"/>
                    <!-- Left eye white -->
                    <ellipse cx="40" cy="49" rx="8" ry="8" fill="#F5F0E8"/>
                    <!-- Right eye white -->
                    <ellipse cx="60" cy="49" rx="8" ry="8" fill="#F5F0E8"/>
                    <!-- Left pupil -->
                    <circle cx="42" cy="50" r="5" fill="#3D2B1F"/>
                    <!-- Right pupil -->
                    <circle cx="62" cy="50" r="5" fill="#3D2B1F"/>
                    <!-- Left eye shine -->
                    <circle cx="44" cy="48" r="1.5" fill="#F5F0E8"/>
                    <!-- Right eye shine -->
                    <circle cx="64" cy="48" r="1.5" fill="#F5F0E8"/>
                    <!-- Beak -->
                    <ellipse cx="50" cy="64" rx="6" ry="4" fill="#B8541C"/>
                    <!-- Left wing -->
                    <ellipse cx="20" cy="100" rx="9" ry="30" fill="#3D2B1F" transform="rotate(-12 20 100)"/>
                    <!-- Right wing -->
                    <ellipse cx="80" cy="100" rx="9" ry="30" fill="#3D2B1F" transform="rotate(12 80 100)"/>
                    <!-- Left foot -->
                    <ellipse cx="38" cy="150" rx="14" ry="5" fill="#B8541C"/>
                    <!-- Right foot -->
                    <ellipse cx="62" cy="150" rx="14" ry="5" fill="#B8541C"/>
                </svg>
            </div>

            <p style="font-size:1.1rem; margin-bottom:2rem; opacity:0.75; font-family:'JetBrains Mono',monospace;">
                This page wandered off somewhere.
            </p>

            <a href="index.html" style="
                display:inline-block;
                padding:0.6rem 1.4rem;
                border:1.5px solid var(--color-accent);
                color:var(--color-accent);
                font-family:'JetBrains Mono',monospace;
                font-size:0.9rem;
                text-decoration:none;
                border-radius:4px;
                transition:background 0.2s, color 0.2s;
            "
            onmouseover="this.style.background='var(--color-accent)';this.style.color='var(--color-global-bg)'"
            onmouseout="this.style.background='';this.style.color='var(--color-accent)'">
                ← Back to Home
            </a>
        </div>
    </main>

    <!-- Footer -->
    <div class="mx-auto max-w-3xl px-4 sm:px-8 py-8 text-center text-sm opacity-75">
        <p>Built from scratch by me and Claude :)</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
